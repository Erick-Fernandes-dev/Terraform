name: "Terraform Direct Flow"

on:
    workflow_dispatch:
    push:
        branches:
            - master
        paths:
            - "Templates_Terraform/**"
    pull_request:
        branches:
            - master
        paths:
            - "Templates_Terraform/**"

env:
    AWS_REGION: us-east-1
    # Defina aqui a pasta do template que quer testar/aplicar
    #WORKING_DIR: "Templates_Terraform/EventBridge"
    WORKING_DIR: "Templates_Terraform/API_Gateway_com_Lambda"

jobs:
    terraform-automation:
        name: "Terraform Validate, Plan and Apply"
        runs-on: ubuntu-latest
        steps:
            # Define o checkout do código
            - name: Checkout
              uses: actions/checkout@v4
            
            - name: Debug Secrets
              run: |
                if [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
                  echo "A chave ID está presente (valor mascarado)"
                else
                  echo "ERRO: A chave ID está VAZIA"
                  exit 1
                fi
            
            # Configurando as credenciais da AWS
            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws-region: ${{ env.AWS_REGION }}
            
            # Configurando o Terraform
            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3
              with:
                terraform_version: "1.8.0"
            
            # Inicializando o Terraform
            - name: Terraform Init
              run: terraform init
              working-directory: ${{ env.WORKING_DIR }}
            
            # Validando a sintaxe do terraform
            - name: Terraform Validate
              run: terraform validate
              working-directory: ${{ env.WORKING_DIR }}
            
            # Executando o plano do terraform
            - name: Terraform Plan
              run: terraform plan
              working-directory: ${{ env.WORKING_DIR }}
            
            # Aplicando o terraform apenas na branch main em push
            - name: Terraform Apply
              # O Apply só roda se for um Push na Main (evita aplicar em PRs de teste)
              if: github.ref == 'refs/heads/master' && github.event_name == 'push'
              run: terraform apply -auto-approve
              working-directory: ${{ env.WORKING_DIR}}

